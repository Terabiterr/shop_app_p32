<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Auth Page</title>
</head>

<body>
    <a href="../index.html" class="btn btn-primary">main</a>
    <div id="register" class="btn_register_form">
        <button id="btn_register" onclick="show_form_register()">register</button>
    </div>
    <div id="login" class="btn_login_form">
        <button id="btn_login" onclick="show_form_login()">login</button>
    </div>
    <!--Form Login-->
    <form id="form_login" class="login">
        <div class="form_element">
            <label for="email">E-mail: </label>
            <input id="input_login_email_id" type="text" name="email">
        </div>
        <div class="form_element">
            <label for="password">Password: </label>
            <input id="input_login_password_id" type="password" name="password">
        </div>
        <div class="form_element">
            <button type="button" id="btn_login" class="btn_login" onclick="login()">login</button>
        </div>
    </form>
    <!--Form Register-->
    <form id="form_register" class="register">
        <div class="form_element">
            <label for="username">UserName: </label>
            <input id="input_register_username_id" type="text" name="username">
        </div>
        <div class="form_element">
            <label for="email">E-mail: </label>
            <input id="input_register_email_id" type="text" name="email">
        </div>
        <div class="form_element">
            <label for="password">Password: </label>
            <input id="input_register_password_id" type="password" name="password">
        </div>
        <div class="form_element">
            <button type="button" id="btn_register" class="btn_register" onclick="register()">register</button>
        </div>
    </form>
    <script src="../js/auth.js"></script>
</body>

</html>
